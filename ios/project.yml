name: HomeworkReminder
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  HomeworkReminder:
    type: application
    platform: iOS
    sources:
      - path: HomeworkReminder/Sources
      - path: HomeworkReminder/Resources
    settings:
      base:
        INFOPLIST_FILE: HomeworkReminder/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.example.HomeworkReminder
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
    postCompileScripts: []
